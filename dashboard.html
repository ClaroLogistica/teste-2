
<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<title>Dashboard</title>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
 body { font-family: 'Segoe UI', Arial; margin:0; background:#0a0f1f; color:white; }
 header { background:#001d3d; padding:25px; text-align:center; font-size:32px; font-weight:bold; color:#dceaff; }
 .container { padding:40px; }
 .card { background:#001526; padding:25px; border-radius:14px; margin-bottom:40px; box-shadow:0 0 15px rgba(0,0,0,0.4); }
 h2 { color:#a4cffd; margin-bottom:15px; }
 canvas { width:100% !important; max-width:900px; margin:auto; }
</style>
</head>
<body>
<header>Dashboard Corporativo – Produção</header>
<div class="container">
<div class="card"><h2>Produção Diária – Linha</h2><canvas id="linha"></canvas></div>
<div class="card"><h2>Comparação – Barras</h2><canvas id="barras"></canvas></div>
<div class="card"><h2>Participação – Pizza</h2><canvas id="pizza"></canvas></div>
</div>
<script>
const labels = [...Array(30).keys()].map(i=>`2026-03-${String(i+1).padStart(2,'0')}`);
const setorA = labels.map(() => Math.floor(Math.random()*100)+50);
const setorB = labels.map(() => Math.floor(Math.random()*90)+30);
const setorC = labels.map(() => Math.floor(Math.random()*70)+10);
new Chart(document.getElementById('linha'), { type:'line', data:{labels:labels,datasets:[{label:'Setor A',borderColor:'#4da8ff',backgroundColor:'rgba(77,168,255,0.25)',data:setorA,fill:true,tension:0.3},{label:'Setor B',borderColor:'#90e0ef',backgroundColor:'rgba(144,224,239,0.25)',data:setorB,fill:true,tension:0.3}]}, options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}});
new Chart(document.getElementById('barras'), { type:'bar', data:{labels:labels,datasets:[{label:'Setor C',backgroundColor:'#0077b6',data:setorC}]}, options:{plugins:{legend:{labels:{color:'white'}}},scales:{x:{ticks:{color:'white'}},y:{ticks:{color:'white'}}}}});
new Chart(document.getElementById('pizza'), { type:'pie', data:{labels:['Setor A','Setor B','Setor C'],datasets:[{data:[setorA.reduce((a,b)=>a+b,0),setorB.reduce((a,b)=>a+b,0),setorC.reduce((a,b)=>a+b,0)],backgroundColor:['#4da8ff','#90e0ef','#0077b6']}]}, options:{plugins:{legend:{labels:{color:'white'}}}}});
</script>
</body>
</html>
