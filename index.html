
<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<title>Dashboard Corporativo de Produção</title>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
<style>
 body {
    font-family: 'Segoe UI', Arial, sans-serif;
    margin: 0;
    background: #0a0f1f;
    color: white;
 }
 header {
    background: #001d3d;
    padding: 25px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
    letter-spacing: 1px;
    color: #dceaff;
 }
 .container {
    padding: 40px;
 }
 .card {
    background: #001526;
    padding: 25px;
    border-radius: 14px;
    margin-bottom: 40px;
    box-shadow: 0 0 15px rgba(0,0,0,0.4);
 }
 h2 {
    margin-bottom: 15px;
    color: #a4cffd;
 }
 canvas { width: 100% !important; max-width: 900px; margin: auto; }
</style>
</head>
<body>

<header>Dashboard Corporativo – Produção a partir de Março/2026</header>

<div class='container'>

<div class='card'>
    <h2>📈 Produção Diária – Gráfico de Linha</h2>
    <canvas id='linha'></canvas>
</div>

<div class='card'>
    <h2>📊 Comparação de Produção – Gráfico de Barras</h2>
    <canvas id='barras'></canvas>
</div>

<div class='card'>
    <h2>🥧 Participação Percentual – Gráfico de Pizza</h2>
    <canvas id='pizza'></canvas>
</div>

</div>

<script>
const labels = ['2026-03-01', '2026-03-02', '2026-03-03', '2026-03-04', '2026-03-05', '2026-03-06', '2026-03-07', '2026-03-08', '2026-03-09', '2026-03-10', '2026-03-11', '2026-03-12', '2026-03-13', '2026-03-14', '2026-03-15', '2026-03-16', '2026-03-17', '2026-03-18', '2026-03-19', '2026-03-20', '2026-03-21', '2026-03-22', '2026-03-23', '2026-03-24', '2026-03-25', '2026-03-26', '2026-03-27', '2026-03-28', '2026-03-29', '2026-03-30'];

new Chart(document.getElementById('linha'), {
    type: 'line',
    data: { labels: labels,
        datasets: [{
            label: 'Setor A',
            borderColor: '#4da8ff',
            backgroundColor: 'rgba(77,168,255,0.25)',
            data: [126, 136, 115, 86, 62, 52, 83, 87, 79, 136, 64, 86, 84, 72, 144, 80, 75, 68, 125, 99, 120, 125, 148, 54, 142, 131, 91, 106, 89, 140],
            fill: true,
            tension: 0.3
        }, {
            label: 'Setor B',
            borderColor: '#90e0ef',
            backgroundColor: 'rgba(144,224,239,0.25)',
            data: [83, 58, 57, 86, 102, 61, 97, 113, 72, 57, 104, 115, 105, 98, 54, 108, 32, 119, 32, 96, 52, 97, 46, 118, 47, 115, 95, 96, 39, 53],
            fill: true,
            tension: 0.3
        }]
    },
    options: {
        plugins: { legend: { labels: { color: 'white' } } },
        scales: {
            x: { ticks: { color: 'white' } },
            y: { ticks: { color: 'white' } }
        }
    }
});

new Chart(document.getElementById('barras'), {
    type: 'bar',
    data: { labels: labels,
        datasets: [{
            label: 'Setor C',
            backgroundColor: '#0077b6',
            data: [71, 26, 56, 21, 72, 33, 24, 55, 32, 37, 11, 28, 11, 18, 59, 28, 56, 17, 21, 20, 41, 68, 39, 26, 76, 67, 40, 35, 18, 37]
        }]
    },
    options: {
        plugins: { legend: { labels: { color: 'white' } } },
        scales: {
            x: { ticks: { color: 'white' } },
            y: { ticks: { color: 'white' } }
        }
    }
});

const totalA = 3005;
const totalB = 2407;
const totalC = 1143;

new Chart(document.getElementById('pizza'), {
    type: 'pie',
    data: {
        labels: ['Setor A', 'Setor B', 'Setor C'],
        datasets: [{
            data: [totalA, totalB, totalC],
            backgroundColor: ['#4da8ff', '#90e0ef', '#0077b6']
        }]
    },
    options: { plugins: { legend: { labels: { color: 'white' } } } }
});
</script>

</body>
</html>
