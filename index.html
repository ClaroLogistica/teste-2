
<!DOCTYPE html>
<html lang='pt-BR'>
<head>
<meta charset='UTF-8'>
<title>Claro</title>
<style>
 body { font-family:'Segoe UI',Arial; margin:0; background:#0a0f1f; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
 .login-box { background:#001526; padding:40px; border-radius:12px; width:350px; text-align:center; box-shadow:0 0 15px rgba(0,0,0,0.4); }
 h2 { color:red; font-size:32px; margin-bottom:20px; }
 input { width:100%; padding:12px; margin-top:10px; border-radius:8px; border:none; }
 button { margin-top:20px; width:100%; padding:12px; background:#004b8d; border:none; color:white; border-radius:8px; cursor:pointer; font-size:16px; }
 button:hover { background:#0066c2; }
 #erro { color:red; margin-top:10px; display:none; }
</style>
</head>
<body>
<div class='login-box'>
<h2>Claro</h2>
<input type='text' id='login' placeholder='Login'>
<input type='password' id='senha' placeholder='Senha'>
<button onclick="autenticar()">Entrar</button>
<p id='erro'>Login ou senha incorretos.</p>
</div>
<script>
function autenticar(){
 const user=document.getElementById('login').value.trim();
 const pass=document.getElementById('senha').value.trim();
 if(user==='claro logistica' && pass==='sucesso'){
   window.location.href='dashboard.html';
 } else {
   document.getElementById('erro').style.display='block';
 }
}
</script>
</body>
</html>
